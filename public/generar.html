<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Placa — Escritorio Aramburu</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #111; color: white;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; padding: 30px 20px; gap: 20px;
  }
  h1 { font-size: 20px; font-weight: 300; letter-spacing: 3px; color: #aaa; text-transform: uppercase; }
  .subtitle { color: #555; font-size: 13px; }
  .controles { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .btn { padding: 11px 26px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.18s; }
  .btn-cargar { background: #2d6a4f; color: white; }
  .btn-cargar:hover { background: #40916c; }
  .btn-dl { background: #c9a84c; color: #111; }
  .btn-dl:hover { background: #e4c060; }
  .btn-dl:disabled { background: #333; color: #666; cursor: not-allowed; }
  .status { font-size: 13px; color: #666; text-align: center; min-height: 18px; }
  .status.ok { color: #40916c; }
  .status.err { color: #e74c3c; }
  .canvas-wrap { border: 1px solid #333; border-radius: 6px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
  canvas { width: 540px; height: 540px; display: block; }
  .panel { background: #1c1c1c; border-radius: 10px; padding: 20px 24px; width: 100%; max-width: 560px; border: 1px solid #2a2a2a; }
  .panel h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: #555; margin-bottom: 12px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .campo label { display: block; font-size: 10px; color: #555; margin-bottom: 4px; text-transform: uppercase; }
  .campo input { width: 100%; padding: 8px 10px; background: #111; border: 1px solid #333; color: white; border-radius: 5px; font-size: 16px; font-weight: bold; text-align: center; }
  .campo input.sm { font-size: 13px; font-weight: normal; text-align: left; }
  .campo input:focus { outline: none; border-color: #c9a84c; }
  .sep { height: 1px; background: #2a2a2a; margin: 14px 0; }
</style>
</head>
<body>

<h1>Generador de Placa</h1>
<p class="subtitle">Escritorio Aramburu — Mercado de Hacienda</p>

<div class="controles">
  <button class="btn btn-cargar" onclick="cargarDatos()">⬇ Cargar datos ACG</button>
  <button class="btn btn-dl" id="btn-dl" onclick="descargar()" disabled>↓ Descargar 1080×1080</button>
</div>

<p class="status" id="status">Hacé click en "Cargar datos ACG" para obtener los valores de esta semana.</p>

<div class="canvas-wrap">

<div class="panel">
  <h3>Ganado Gordo — valores actuales</h3>
  <div class="grid3">

    <div class="campo"><label>Novillo ant.</label><input id="a-nov" placeholder="5.41" oninput="dibujar()"></div>
    <div class="campo"><label>Vaca ant.</label><input id="a-vac" placeholder="5.07" oninput="dibujar()"></div>
    <div class="campo"><label>Vaquillona ant.</label><input id="a-vaq" placeholder="5.30" oninput="dibujar()"></div>
  </div>
  <div class="sep"></div>
  <h3>Faena Semanal</h3>
  <div class="grid2">
    <div class="campo"><label>Bovinos</label><input id="v-bov" placeholder="33.738" oninput="dibujar()"></div>
    <div class="campo"><label>Ovinos</label><input id="v-ovi" placeholder="2.587" oninput="dibujar()"></div>
  </div>
  <div class="grid2">
    <div class="campo"><label>Bovinos ant.</label><input id="a-bov" placeholder="31.252" oninput="dibujar()"></div>
    <div class="campo"><label>Ovinos ant.</label><input id="a-ovi" placeholder="4.092" oninput="dibujar()"></div>
  </div>
  <div class="sep"></div>
  <div class="grid2">
    <div class="campo"><label>Semana N°</label><input id="v-sem" placeholder="18" oninput="dibujar()"></div>
    <div class="campo"><label>Comentario</label><input id="v-com" class="sm" placeholder="Mercado firme." oninput="dibujar()"></div>
  </div>
</div>

function g(id){ var e=document.getElementById(id); return e?e.value.trim():""; }
function s(id,v){ var e=document.getElementById(id); if(e) e.value=v||""; }

function cargarDatos(){
  var st=document.getElementById("status");
  st.className="status"; st.textContent="Cargando datos de ACG...";
  fetch(PROXY)
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(!d.ok) throw new Error();
      s("v-nov", d.gordos.novillo);
      s("v-vac", d.gordos.vaca);
      s("v-vaq", d.gordos.vaquillona);
      s("a-nov", d.gordos.novilloAnt    || "");
      s("a-vac", d.gordos.vacaAnt       || "");
      s("a-vaq", d.gordos.vaquillonaAnt || "");
      s("v-sem", d.semana);
      if(d.faena){
        s("v-bov", fmtNum(d.faena.bovinos));
        s("v-ovi", fmtNum(d.faena.ovinos));
        s("a-bov", fmtNum(d.faena.bovinosAnt));
        s("a-ovi", fmtNum(d.faena.ovinosAnt));
      }
      st.className="status ok";
      st.textContent="✓ Datos cargados — Semana N°"+(d.semana||"?");
      document.getElementById("btn-dl").disabled=false;
      dibujar();
    })
    .catch(function(){
      st.className="status err";
      st.textContent="No se pudieron cargar los datos. Ingresalos manualmente.";
      document.getElementById("btn-dl").disabled=false;
      dibujar();
    });
}

function fmtNum(n){
  if(!n) return "";
  var num=parseInt(String(n).replace(/\D/g,""));
  return isNaN(num)?"":num.toLocaleString("es-UY");
}

function tend(a,b){
  var x=parseFloat(String(a).replace(",",".")),
      y=parseFloat(String(b).replace(",","."));
  if(isNaN(x)||isNaN(y)||y===0) return null;
  return x>y?"up":x<y?"down":"eq";
}

function shadow(ctx,ox,oy,blur,col){
  ctx.shadowOffsetX=ox; ctx.shadowOffsetY=oy;
  ctx.shadowBlur=blur; ctx.shadowColor=col;
}
function noShadow(ctx){
  ctx.shadowOffsetX=0; ctx.shadowOffsetY=0;
  ctx.shadowBlur=0; ctx.shadowColor="transparent";
}
function rr(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// Dibujar triángulo flecha
function drawArrow(ctx, x, y, dir, color){
  var size = 28;
  ctx.fillStyle = color;
  ctx.beginPath();
  if(dir === "up"){
    ctx.moveTo(x, y - size);
    ctx.lineTo(x + size*0.8, y + size*0.2);
    ctx.lineTo(x - size*0.8, y + size*0.2);
  } else if(dir === "down"){
    ctx.moveTo(x, y + size);
    ctx.lineTo(x + size*0.8, y - size*0.2);
    ctx.lineTo(x - size*0.8, y - size*0.2);
  } else {
    // igual — rombo pequeño
    ctx.moveTo(x, y - size*0.5);
    ctx.lineTo(x + size*0.5, y);
    ctx.lineTo(x, y + size*0.5);
    ctx.lineTo(x - size*0.5, y);
  }
  ctx.closePath();
  ctx.fill();
}

function dibujar(){
  var C=document.getElementById("placa");
  var ctx=C.getContext("2d");
  var W=1080, H=1080;

  // Fondo
  if(bgImg.complete && bgImg.naturalWidth>0){
    ctx.drawImage(bgImg, 0, 0, W, H);
    // Overlay suave solo en la parte superior — deja vacas y logo visibles
    var gr=ctx.createLinearGradient(0,0,0,H);
    gr.addColorStop(0,   "rgba(0,10,35,0.80)");
    gr.addColorStop(0.35,"rgba(0,10,35,0.65)");
    gr.addColorStop(0.55,"rgba(0,0,0,0.10)");
    gr.addColorStop(1,   "rgba(0,0,0,0)");
    ctx.fillStyle=gr; ctx.fillRect(0,0,W,H);
  } else {
    ctx.fillStyle="#1a3a5c"; ctx.fillRect(0,0,W,H);
  }

  var sem=g("v-sem")||"?", com=g("v-com");
  var nov=g("v-nov")||"—", vac=g("v-vac")||"—", vaq=g("v-vaq")||"—";
  var anov=g("a-nov"), avac=g("a-vac"), avaq=g("a-vaq");
  var bov=g("v-bov")||"—", ovi=g("v-ovi")||"—";
  var abov=g("a-bov"), aovi=g("a-ovi");

  ctx.textAlign="center";

  // ── TÍTULO ──
  shadow(ctx,0,4,20,"rgba(0,0,0,0.9)");
  ctx.font="400 76px Helvetica Neue, Helvetica, Arial, sans-serif";
  ctx.fillStyle="white";
  ctx.fillText("MERCADO DE HACIENDA", W/2, 108);

  // Subtítulo
  ctx.font="28px Arial, sans-serif";
  ctx.fillStyle="rgba(255,255,255,0.80)";
  ctx.fillText("ACG - Semana No "+sem, W/2, 150);

  // Comentario
  if(com){
    ctx.font="italic 20px Arial, sans-serif";
    ctx.fillStyle="rgba(255,255,255,0.55)";
    ctx.fillText("Comentario:", W/2, 192);
    ctx.font="22px Arial, sans-serif";
    ctx.fillStyle="rgba(255,255,255,0.85)";
    ctx.fillText(com, W/2, 220);
  }
  noShadow(ctx);

  // ── TARJETAS GANADO GORDO ──
  var cardY = com ? 256 : 192;
  var cards=[
    {label:"NOVILLO",    val:nov, ant:anov},
    {label:"VACA",       val:vac, ant:avac},
    {label:"VAQUILLONA", val:vaq, ant:avaq},
  ];
  var cW=310, cH=210, cGap=16;
  var sx=(W-(3*cW+2*cGap))/2;

  cards.forEach(function(c,i){
    var cx=sx+i*(cW+cGap), cy=cardY;
    var t=tend(c.val, c.ant);

    // Header azul oscuro
    ctx.fillStyle="rgba(30,60,110,0.88)";
    rr(ctx,cx,cy,cW,52,6); ctx.fill();
    ctx.font="600 19px Helvetica Neue, Helvetica, Arial, sans-serif";
    ctx.fillStyle="white"; ctx.textAlign="center";
    ctx.letterSpacing="3px";
    ctx.fillText(c.label, cx+cW/2, cy+36);
    ctx.letterSpacing="0px";

    // Cuerpo azul más claro
    ctx.fillStyle="rgba(90,140,210,0.45)";
    rr(ctx,cx,cy+52,cW,cH-52,6); ctx.fill();

    // Valor principal — tipografía bold grande
    var vs = c.val.replace(".",",");
    ctx.font="400 72px Helvetica Neue, Helvetica, Arial, sans-serif";
    ctx.fillStyle="white";
    shadow(ctx,2,2,8,"rgba(0,0,0,0.5)");

    // Calcular ancho para posicionar flecha al lado
    var vw = ctx.measureText(vs).width;
    var arrowSpace = t ? 40 : 0;
    ctx.fillText(vs, cx+cW/2 - arrowSpace/2, cy+158);
    noShadow(ctx);

    // Flecha triangular al lado derecho del número
    if(t){
      var ax = cx+cW/2 + vw/2 - arrowSpace/2 + 26;
      var ay = cy+136;
      var color = t==="up"?"#22b14c":t==="down"?"#e63946":"#f4a261";
      drawArrow(ctx, ax, ay, t, color);
    }

    // Semana anterior — más pequeño, debajo
    if(c.ant){
      ctx.font="18px Arial, sans-serif";
      ctx.fillStyle="rgba(255,255,255,0.65)";
      ctx.textAlign="center";
      ctx.fillText("Semana anterior: "+c.ant.replace(".",","), cx+cW/2, cy+194);
    }
  });

  // ── FAENA SEMANAL ──
  var fy=cardY+cH+50;
  shadow(ctx,0,3,16,"rgba(0,0,0,0.8)");
  ctx.font="400 54px Helvetica Neue, Helvetica, Arial, sans-serif";
  ctx.fillStyle="white"; ctx.textAlign="center";
  ctx.fillText("FAENA SEMANAL", W/2, fy+55);
  ctx.font="26px Arial, sans-serif";
  ctx.fillStyle="rgba(255,255,255,0.70)";
  ctx.fillText("INAC - Semana N° "+sem, W/2, fy+92);
  noShadow(ctx);

  var fCards=[{label:"BOVINOS",val:bov,ant:abov},{label:"OVINOS",val:ovi,ant:aovi}];
  var fW=345,fH=158,fGap=26;
  var fsx=(W-(2*fW+fGap))/2, fcy=fy+108;

  fCards.forEach(function(c,i){
    var cx=fsx+i*(fW+fGap);
    ctx.font="600 19px Helvetica Neue, Helvetica, Arial, sans-serif";
    ctx.fillStyle="white"; ctx.textAlign="center";
    ctx.letterSpacing="3px";
    ctx.fillText(c.label, cx+fW/2, fcy+34);
    ctx.letterSpacing="0px";

    ctx.fillStyle="rgba(90,140,210,0.45)";
    rr(ctx,cx,fcy+42,fW,88,6); ctx.fill();

    ctx.font="400 50px Helvetica Neue, Helvetica, Arial, sans-serif";
    ctx.fillStyle="white";
    ctx.fillText(c.val, cx+fW/2, fcy+106);

    if(c.ant){
      ctx.font="17px Arial, sans-serif";
      ctx.fillStyle="rgba(255,255,255,0.60)";
      ctx.fillText("Semana anterior: "+c.ant, cx+fW/2, fcy+146);
    }
  });

  document.getElementById("btn-dl").disabled=false;
}

function descargar(){
  var c=document.getElementById("placa"), a=document.createElement("a");
  var hoy=new Date();
  var f=hoy.getFullYear()+"-"+String(hoy.getMonth()+1).padStart(2,"0")+"-"+String(hoy.getDate()).padStart(2,"0");
  a.download="mercado-hacienda-aramburu-"+f+".png";
  a.href=c.toDataURL("image/png"); a.click();
}

window.onload=function(){ dibujar(); };
</script>
